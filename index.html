<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missão Matemática – Daniel</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0c29;
    --card: #1a1a3e;
    --accent: #f9c74f;
    --green: #43e97b;
    --red: #f72585;
    --blue: #4cc9f0;
    --purple: #a855f7;
    --text: #f0f0ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    background-image: radial-gradient(ellipse at 20% 20%, #2d1b69 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, #1a0536 0%, transparent 50%);
  }

  /* Stars */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: .2; transform: scale(1); }
    50%      { opacity: 1;  transform: scale(1.4); }
  }

  .wrapper {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px;
    padding: 16px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }

  /* Header */
  .title {
    font-family: 'Bangers', cursive;
    font-size: clamp(2rem, 8vw, 3rem);
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(249,199,79,.6), 3px 3px 0 #c77700;
    text-align: center;
    animation: popIn .6s cubic-bezier(.175,.885,.32,1.275) both;
  }
  .subtitle {
    font-size: .9rem; color: #aaa; margin-top: -10px;
    animation: popIn .6s .1s cubic-bezier(.175,.885,.32,1.275) both;
  }
  @keyframes popIn {
    from { opacity:0; transform: scale(.7) translateY(20px); }
    to   { opacity:1; transform: none; }
  }

  /* HUD */
  .hud {
    display: flex; gap: 12px; width: 100%;
    animation: popIn .5s .2s both;
  }
  .hud-box {
    flex: 1; background: var(--card);
    border-radius: 12px; padding: 10px;
    text-align: center;
    border: 2px solid rgba(255,255,255,.08);
  }
  .hud-label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: #888; }
  .hud-val {
    font-family: 'Bangers', cursive;
    font-size: 1.8rem; letter-spacing: 1px;
    color: var(--accent);
    transition: color .3s;
  }
  .hud-val.green { color: var(--green); }
  .hud-val.red   { color: var(--red);   }

  /* Progress bar */
  .prog-bar {
    width: 100%; height: 8px;
    background: rgba(255,255,255,.1);
    border-radius: 99px; overflow: hidden;
  }
  .prog-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--blue), var(--purple));
    transition: width .5s ease;
  }

  /* Card */
  .card {
    width: 100%;
    background: var(--card);
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,.1);
    padding: 28px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,.5);
    animation: popIn .4s both;
  }

  .category-badge {
    font-size: .75rem; font-weight: 900; text-transform: uppercase;
    letter-spacing: 2px; padding: 4px 14px; border-radius: 99px;
  }

  .question {
    font-family: 'Bangers', cursive;
    font-size: clamp(2rem, 10vw, 3.5rem);
    letter-spacing: 2px;
    text-align: center;
    line-height: 1.15;
    color: #fff;
    text-shadow: 0 0 30px rgba(76,201,240,.3);
  }

  /* Options */
  .options {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; width: 100%;
  }
  .opt {
    background: rgba(255,255,255,.06);
    border: 2px solid rgba(255,255,255,.12);
    border-radius: 14px;
    padding: 16px 8px;
    font-family: 'Bangers', cursive;
    font-size: 1.6rem;
    letter-spacing: 1px;
    color: #fff;
    cursor: pointer;
    transition: all .18s;
    text-align: center;
  }
  .opt:hover:not(:disabled) {
    background: rgba(76,201,240,.15);
    border-color: var(--blue);
    transform: translateY(-2px) scale(1.03);
  }
  .opt.correct {
    background: rgba(67,233,123,.2);
    border-color: var(--green);
    color: var(--green);
    animation: shake-correct .4s;
  }
  .opt.wrong {
    background: rgba(247,37,133,.15);
    border-color: var(--red);
    color: var(--red);
    animation: shake .4s;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}
  }
  @keyframes shake-correct {
    0%,100%{transform:scale(1)}50%{transform:scale(1.08)}
  }

  /* Feedback */
  .feedback {
    font-size: 1.1rem; font-weight: 900;
    text-align: center; min-height: 28px;
    transition: opacity .2s;
  }
  .feedback.ok   { color: var(--green); }
  .feedback.fail { color: var(--red); }

  /* Timer */
  .timer-ring { position: relative; width: 60px; height: 60px; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke-width: 5; }
  .timer-ring .bg { stroke: rgba(255,255,255,.1); }
  .timer-ring .fg {
    stroke: var(--blue);
    stroke-linecap: round;
    stroke-dasharray: 163;
    transition: stroke-dashoffset .9s linear, stroke .3s;
  }
  .timer-val {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bangers', cursive; font-size: 1.3rem; color: #fff;
  }

  /* Level select */
  .level-screen, .end-screen {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    text-align: center;
    animation: popIn .5s both;
  }
  .level-btn {
    width: 260px; padding: 14px 20px;
    border-radius: 14px; border: none;
    font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1rem;
    cursor: pointer;
    transition: all .18s;
    display: flex; flex-direction: column; gap: 2px;
  }
  .level-btn:hover { transform: scale(1.04); }
  .level-btn .lname { font-size: 1.1rem; }
  .level-btn .ldesc { font-size: .78rem; opacity: .75; font-weight: 700; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #f4a261);
    color: #1a1a1a;
    border: none; border-radius: 14px;
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 1.1rem; padding: 14px 36px;
    cursor: pointer;
    transition: all .18s;
    box-shadow: 0 4px 20px rgba(249,199,79,.4);
  }
  .btn-primary:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(249,199,79,.6); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: confetti-fall var(--dur) ease-out forwards;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-20px) rotate(0); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* End screen stars */
  .big-emoji { font-size: 4rem; animation: popIn .5s both; }
  .end-score {
    font-family: 'Bangers', cursive; font-size: 3rem;
    color: var(--accent); letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrapper" id="app">
  <!-- Conteúdo dinâmico -->
</div>

<script>
// ──── CONFIG ────────────────────────────────────────────────────────────
const LEVELS = [
  { id:'easy',   name:'🟢 Fácil',    desc:'Adição e Subtração', color:'#43e97b', bg:'rgba(67,233,123,.15)', ops:['+','-'],      range:[1,20],  time:20 },
  { id:'medium', name:'🟡 Médio',    desc:'Multiplicação',      color:'#f9c74f', bg:'rgba(249,199,79,.15)', ops:['×','÷'],      range:[2,9],   time:18 },
  { id:'hard',   name:'🔴 Difícil',  desc:'Misturão Total',         color:'#f72585', bg:'rgba(247,37,133,.15)', ops:['+','-','×'],  range:[1,50],  time:15 },
  { id:'expert', name:'🟣 Expert',   desc:'Expressões com Parênteses', color:'#a855f7', bg:'rgba(168,85,247,.15)', ops:['paren'],      range:[1,15],  time:25 },
];
const TOTAL_QUESTIONS = 10;

// ──── STATE ─────────────────────────────────────────────────────────────
let state = { screen:'level', level:null, q:0, score:0, correct:0, timer:0, timerInt:null, current:null };

// ──── HELPERS ───────────────────────────────────────────────────────────
function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

// ──── GERADOR DE EXPRESSÕES COM PARÊNTESES ───────────────────────────────
function genParenQuestion(){
  // Escolhe aleatoriamente um dos 6 padrões de expressão
  const pattern = rand(1,6);
  let text, ans, category;

  if(pattern===1){
    // (a + b) × c
    const a=rand(1,10), b=rand(1,10), c=rand(2,9);
    ans=(a+b)*c; text=`(${a} + ${b}) × ${c} = ?`; category='(+) × c';
  } else if(pattern===2){
    // (a - b) × c  — garante a>b
    const b=rand(1,8), a=rand(b+1,15), c=rand(2,9);
    ans=(a-b)*c; text=`(${a} - ${b}) × ${c} = ?`; category='(-) × c';
  } else if(pattern===3){
    // a × (b + c)
    const a=rand(2,9), b=rand(1,10), c=rand(1,10);
    ans=a*(b+c); text=`${a} × (${b} + ${c}) = ?`; category='a × (+)';
  } else if(pattern===4){
    // a + (b × c)
    const a=rand(1,20), b=rand(2,9), c=rand(2,9);
    ans=a+(b*c); text=`${a} + (${b} × ${c}) = ?`; category='a + (×)';
  } else if(pattern===5){
    // (a + b) × (c + d)
    const a=rand(1,8), b=rand(1,8), c=rand(1,5), d=rand(1,5);
    ans=(a+b)*(c+d); text=`(${a}+${b}) × (${c}+${d}) = ?`; category='(+)×(+)';
  } else {
    // a × b - (c + d)
    const c=rand(1,8), d=rand(1,8), a=rand(2,9), b=rand(2,9);
    ans=a*b-(c+d); text=`${a}×${b} - (${c}+${d}) = ?`; category='a×b-(+)';
  }

  const wrongs = new Set();
  while(wrongs.size<3){
    let w = ans + rand(-8,8)*rand(1,4);
    if(w!==ans && w>0) wrongs.add(w);
  }
  return { text, ans, choices: shuffle([ans,...wrongs]), category: '🔵 '+category, isParen: true };
}

function genQuestion(level){
  if(level.ops[0]==='paren') return genParenQuestion();

  const op = level.ops[rand(0,level.ops.length-1)];
  let a,b,ans;
  if(op==='+'){  a=rand(level.range[0],level.range[1]); b=rand(level.range[0],level.range[1]); ans=a+b; }
  if(op==='-'){  a=rand(level.range[0],level.range[1]); b=rand(0,a); ans=a-b; }
  if(op==='×'){  a=rand(2,level.range[1]); b=rand(2,level.range[1]); ans=a*b; }
  if(op==='÷'){  b=rand(2,level.range[1]); ans=rand(2,level.range[1]); a=b*ans; }
  // Wrong choices
  const wrongs = new Set();
  while(wrongs.size<3){
    let w = ans + rand(-5,5)*rand(1,3);
    if(w!==ans && w>=0) wrongs.add(w);
  }
  const choices = shuffle([ans,...wrongs]);
  return { text:`${a} ${op} ${b} = ?`, ans, choices,
           category: { '+':'Adição', '-':'Subtração', '×':'Multiplicação', '÷':'Divisão' }[op] };
}

// ──── STARS ─────────────────────────────────────────────────────────────
(function createStars(){
  const c = document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s = document.createElement('div');
    s.className='star';
    const sz = Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
    c.appendChild(s);
  }
})();

// ──── CONFETTI ──────────────────────────────────────────────────────────
function confetti(){
  const colors=['#f9c74f','#43e97b','#4cc9f0','#a855f7','#f72585','#fff'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[rand(0,colors.length-1)]};--dur:${(Math.random()*1.5+.8).toFixed(2)}s;animation-delay:${(Math.random()*.5).toFixed(2)}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2500);
  }
}

// ──── TIMER ─────────────────────────────────────────────────────────────
function startTimer(seconds, onTick, onEnd){
  clearInterval(state.timerInt);
  state.timer = seconds;
  onTick(seconds, seconds);
  state.timerInt = setInterval(()=>{
    state.timer--;
    onTick(state.timer, seconds);
    if(state.timer<=0){ clearInterval(state.timerInt); onEnd(); }
  },1000);
}

// ──── RENDER ─────────────────────────────────────────────────────────────
const app = document.getElementById('app');

function render(){
  if(state.screen==='level') renderLevel();
  else if(state.screen==='game') renderGame();
  else if(state.screen==='end') renderEnd();
}

function renderLevel(){
  app.innerHTML=`
    <div class="title">🚀 Missão<br>Matemática</div>
    <div class="subtitle">Escolha a dificuldade, Daniel!</div>
    <div class="level-screen">
      ${LEVELS.map(l=>`
        <button class="level-btn" onclick="startGame('${l.id}')"
          style="background:${l.bg};border:2px solid ${l.color};color:#fff">
          <span class="lname">${l.name}</span>
          <span class="ldesc">${l.desc} · ⏱ ${l.time}s por questão</span>
        </button>
      `).join('')}
    </div>`;
}

function renderGame(){
  const lvl = state.level;
  const q = state.current;
  const progPct = (state.q / TOTAL_QUESTIONS)*100;
  const catColor = { 'Adição':lvl.color,'Subtração':'#4cc9f0','Multiplicação':'#a855f7','Divisão':'#f9c74f' }[q.category]||lvl.color;

  app.innerHTML=`
    <div class="title" style="font-size:1.8rem">🚀 Missão Matemática</div>

    <div class="hud">
      <div class="hud-box">
        <div class="hud-label">Questão</div>
        <div class="hud-val">${state.q+1}<span style="font-size:.9rem;color:#666">/${TOTAL_QUESTIONS}</span></div>
      </div>
      <div class="hud-box">
        <div class="hud-label">Pontos</div>
        <div class="hud-val green" id="scoreVal">${state.score}</div>
      </div>
      <div class="hud-box" style="flex:0 0 70px">
        <div class="timer-ring">
          <svg width="60" height="60" viewBox="0 0 60 60">
            <circle class="bg" cx="30" cy="30" r="26"/>
            <circle class="fg" id="timerArc" cx="30" cy="30" r="26"
              stroke-dashoffset="0"/>
          </svg>
          <div class="timer-val" id="timerVal">${lvl.time}</div>
        </div>
      </div>
    </div>

    <div class="prog-bar"><div class="prog-fill" style="width:${progPct}%"></div></div>

    <div class="card" id="qcard">
      <span class="category-badge" style="background:${catColor}22;color:${catColor};border:1px solid ${catColor}40">${q.category}</span>
      <div class="question" style="font-size:${q.isParen?'clamp(1.3rem,6vw,2.2rem)':'clamp(2rem,10vw,3.5rem)'}">${q.text}</div>
      <div class="options" id="opts">
        ${q.choices.map(c=>`
          <button class="opt" onclick="answer(${c},this)">${c}</button>
        `).join('')}
      </div>
      <div class="feedback" id="fb"></div>
    </div>`;

  // Start timer
  const arc = document.getElementById('timerArc');
  const circ = 2*Math.PI*26; // ~163
  startTimer(lvl.time,
    (t,total)=>{
      const el=document.getElementById('timerVal');
      const arcEl=document.getElementById('timerArc');
      if(el) el.textContent=t;
      if(arcEl){
        const offset = circ*(1-t/total);
        arcEl.style.strokeDashoffset=offset;
        arcEl.style.stroke = t<=5?'#f72585':t<=8?'#f9c74f':'#4cc9f0';
      }
    },
    ()=>{ timeOut(); }
  );
}

function renderEnd(){
  clearInterval(state.timerInt);
  const pct = Math.round(state.correct/TOTAL_QUESTIONS*100);
  const emoji = pct>=90?'🏆':pct>=60?'⭐':'💪';
  const msg   = pct>=90?'Incrível, Daniel!':pct>=60?'Muito bem!':'Continue tentando!';
  const sub   = pct>=90?'Você é um gênio da matemática!':pct>=60?'Ótimo desempenho!':'A prática leva à perfeição!';
  if(pct>=60) confetti();
  app.innerHTML=`
    <div class="end-screen">
      <div class="big-emoji">${emoji}</div>
      <div class="title">${msg}</div>
      <div class="subtitle">${sub}</div>
      <div class="card" style="gap:12px;padding:24px">
        <div style="font-size:.85rem;color:#888;text-transform:uppercase;letter-spacing:1px">Resultado Final</div>
        <div class="end-score">${state.score} pts</div>
        <div style="color:#aaa;font-size:.95rem">
          ✅ ${state.correct} certas &nbsp;|&nbsp;
          ❌ ${TOTAL_QUESTIONS-state.correct} erradas &nbsp;|&nbsp;
          🎯 ${pct}%
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <button class="btn-primary" onclick="startGame('${state.level.id}')">🔄 Jogar de Novo</button>
        <button class="btn-primary" style="background:linear-gradient(135deg,#4cc9f0,#a855f7);color:#fff"
          onclick="goLevel()">🏠 Trocar Nível</button>
      </div>
    </div>`;
}

// ──── ACTIONS ────────────────────────────────────────────────────────────
function startGame(levelId){
  clearInterval(state.timerInt);
  state.level   = LEVELS.find(l=>l.id===levelId);
  state.q       = 0;
  state.score   = 0;
  state.correct = 0;
  state.screen  = 'game';
  state.current = genQuestion(state.level);
  render();
}

function goLevel(){
  clearInterval(state.timerInt);
  state.screen='level';
  render();
}

function answer(val, btn){
  clearInterval(state.timerInt);
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o=>o.disabled=true);
  const fb = document.getElementById('fb');
  const isCorrect = val===state.current.ans;
  if(isCorrect){
    btn.classList.add('correct');
    state.score += 10 + state.timer; // bônus velocidade
    state.correct++;
    document.getElementById('scoreVal').textContent=state.score;
    fb.className='feedback ok';
    fb.textContent='✅ Correto! +' + (10+state.timer) + ' pts';
  } else {
    btn.classList.add('wrong');
    // Highlight correct
    opts.forEach(o=>{ if(Number(o.textContent)===state.current.ans) o.classList.add('correct'); });
    fb.className='feedback fail';
    fb.textContent=`❌ Era ${state.current.ans}`;
  }
  setTimeout(nextQ, 1200);
}

function timeOut(){
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o=>o.disabled=true);
  opts.forEach(o=>{ if(Number(o.textContent)===state.current.ans) o.classList.add('correct'); });
  const fb=document.getElementById('fb');
  if(fb){ fb.className='feedback fail'; fb.textContent=`⏰ Tempo! Era ${state.current.ans}`; }
  setTimeout(nextQ, 1300);
}

function nextQ(){
  state.q++;
  if(state.q>=TOTAL_QUESTIONS){ state.screen='end'; render(); return; }
  state.current=genQuestion(state.level);
  renderGame();
}

// ──── INIT ───────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
